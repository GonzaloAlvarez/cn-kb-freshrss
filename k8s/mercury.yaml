---
# wangqiru/mercury-parser-api — multi-arch (incl. arm64), listens on :3000.
# Used by the xExtension-Readable FreshRSS extension to enrich short feed
# items with full article content. Stateless — single replica is fine.
#
# Service-internal only; nothing in the namespace is exposed beyond what
# freshrss's two Ingress objects already publish. The extension calls
# this service from within the same k8s namespace as `http://mercury:3000`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mercury
  namespace: kb-freshrss
  labels:
    component: mercury
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      component: mercury
  template:
    metadata:
      labels:
        component: mercury
    spec:
      containers:
        - name: mercury
          image: wangqiru/mercury-parser-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # The image exposes /parser but there's no dedicated health endpoint.
          # A /parser call with no URL returns a 400 which is still "server is up".
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: mercury
  namespace: kb-freshrss
  labels:
    component: mercury
spec:
  type: ClusterIP
  selector:
    component: mercury
  ports:
    - name: http
      port: 3000
      targetPort: http
